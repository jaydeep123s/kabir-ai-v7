<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com; connect-src ws://localhost:* http://localhost:* blob:; worker-src blob: *" />
    <title></title>
    <link rel="stylesheet" href="renderer.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
  </head>
  <body>
    <div id="app">

      <div class="titlebar" id="titlebar">
        <div class="titlebar-left">
          <span class="status-dot" id="statusDot"></span>
          <span class="status-label" id="statusLabel">Ready</span>
          <span class="audio-indicator" id="audioIndicator" title="Audio off">🎙️</span>
          <button class="speaker-toggle" id="speakerToggle" title="Click to flip speaker (Ctrl+Shift+T)">
            <span class="speaker-toggle__icon" id="speakerIcon">🎧</span>
            <span class="speaker-toggle__label" id="speakerLabel">Interviewer</span>
          </button>
        </div>
        <div class="titlebar-center drag-region">
          <span class="app-title">Kabir AI</span>
        </div>
        <div class="titlebar-right">
          <button class="ctrl-btn ctrl-btn--user" id="userProfileBtn" title="Switch User Profile">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </button>
          <button class="ctrl-btn ctrl-btn--rag" id="ragToggleBtn" title="Resume & JD">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
          </button>
          <button class="ctrl-btn" id="lockBtn" title="Lock (click-through)">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </button>
          <button class="ctrl-btn" id="clearBtn" title="Clear">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
            </svg>
          </button>
          <button class="ctrl-btn" id="minimizeBtn" title="Minimize">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
          <button class="ctrl-btn ctrl-btn--close" id="closeBtn" title="Close">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="user-panel" id="userPanel">
        <div class="user-panel__header">
          <span class="user-panel__title">User Profiles</span>
          <button class="user-add-btn" id="addUserBtn" title="Add new user">+ Add</button>
        </div>
        <div class="user-list" id="userList"></div>
        <div class="user-form" id="userForm" style="display:none;">
          <input type="text" id="userNameInput" class="user-input" placeholder="Name (e.g. Jaydeep)" maxlength="40" />
          <input type="text" id="userRoleInput" class="user-input" placeholder="Role (e.g. Senior DevOps Engineer)" maxlength="60" />
          <input type="text" id="userCompanyInput" class="user-input" placeholder="Company (e.g. Cloud4C, TCS)" maxlength="80" />
          <textarea id="userResumeInput" class="user-textarea" placeholder="Resume text…" rows="5"></textarea>
          <textarea id="userJdInput" class="user-textarea" placeholder="Job Description…" rows="4"></textarea>
          <div class="user-form-actions">
            <button class="user-save-btn" id="saveUserBtn">Save Profile</button>
            <button class="user-cancel-btn" id="cancelUserBtn">Cancel</button>
          </div>
        </div>
      </div>

      <div class="rag-panel" id="ragPanel">
        <div class="rag-panel__header">
          <span class="rag-panel__title">Context (RAG)</span>
          <span class="rag-panel__hint" id="ragHint">Profile data use hoga</span>
        </div>
        <div class="rag-section">
          <div class="rag-section__label">
            <span>Resume</span>
            <span class="badge" id="resumeBadge">Not loaded</span>
          </div>
          <textarea id="resumeInput" class="rag-textarea" placeholder="Paste resume here…" rows="4"></textarea>
          <button class="rag-btn" id="uploadResumeBtn">Upload Resume</button>
        </div>
        <div class="rag-section">
          <div class="rag-section__label">
            <span>Job Description</span>
            <span class="badge" id="jdBadge">Not loaded</span>
          </div>
          <textarea id="jdInput" class="rag-textarea" placeholder="Paste JD here…" rows="4"></textarea>
          <button class="rag-btn" id="uploadJdBtn">Upload JD</button>
        </div>
      </div>

      <div class="content-area" id="contentArea">
        <div class="message-stream" id="messageStream"></div>
      </div>

      <div class="question-panel">
        <textarea id="questionInput" class="question-input" placeholder="Type question… (Ctrl+Enter to send)" rows="1"></textarea>
        <button class="send-btn" id="sendBtn" title="Send (Ctrl+Enter)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>

      <div class="feature-status" id="featureStatus" style="display:none;">
        <span class="feature-status-text" id="featureStatusText">Working…</span>
      </div>

      <div class="toolbar" id="toolbar">
        <button class="tool-btn tool-btn--icon tool-btn--audio" id="audioBtn" title="Toggle Audio (Ctrl+Shift+A)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>

        <select class="device-select" id="micSelect" title="Your Mic (Candidate)">
          <option value="">🎙 Default Mic</option>
        </select>

        <select class="device-select" id="spkrSelect" title="Speaker/Capture (Interviewer)">
          <option value="">🔊 Speaker Input</option>
        </select>

        <button class="tool-btn tool-btn--icon tool-btn--capture" id="captureBtn" title="Screen Capture (Ctrl+Shift+C)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>
          </svg>
        </button>

        <button class="tool-btn tool-btn--icon tool-btn--ocr" id="ocrBtn" title="Screen OCR (Ctrl+Shift+S)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6v6H9z"/><path d="M3 9h2M3 15h2M19 9h2M19 15h2M9 3v2M15 3v2M9 19v2M15 19v2"/>
          </svg>
        </button>

        <button class="tool-btn tool-btn--icon tool-btn--stealth" id="stealthBtn" title="Stealth Type (Ctrl+Shift+I)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>

        <button class="tool-btn tool-btn--icon" id="flushBtn" title="Force send audio now (F)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
        </button>

        <span class="token-counter" id="tokenCount">0 tok</span>
      </div>

      <div class="hotkey-hint">Ctrl+Shift+A audio · C capture · S ocr · I type · O hide · ESC panic · Ctrl+, settings · T speaker · F interviewer · M me</div>

      <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
      <script src="renderer.js"></script>
    </div>
  </body>
</html>
